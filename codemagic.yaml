workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          cd upk_app
          flutter pub get
      - name: Build APK
        script: |
          cd upk_app
          flutter build apk --release
    artifacts:
      - upk_app/build/**/outputs/**/*.apk
